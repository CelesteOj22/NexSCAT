events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Aumentar límite para subida de proyectos Java (ZIP, carpetas)
    client_max_body_size 500M;

    # Timeouts generosos para análisis largos
    proxy_read_timeout 3600s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream django {
        server web:8000;
    }

    server {
        listen 80;
        server_name _;   # Acepta cualquier host (IP directa o dominio)

        # Archivos estáticos — servidos por Nginx directamente
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Archivos media
        location /media/ {
            alias /app/media/;
        }

        # SSE (Server-Sent Events) — desactivar buffering para que lleguen en tiempo real
        location /analysis/stream/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Crítico para SSE:
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # Todo lo demás → Django
        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}
